<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  {% include seo.html %}
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}" />
</head>
<body class="page">

  <header class="topbar">
    <div class="container topbar__inner">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-dot"></span>
        Redes y Sistemas Complejos
      </a>
      <nav class="nav" aria-label="Navegación principal">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Inicio</a>
        <a href="{{ '/curso-redes-complejas/' | relative_url }}"{% if page.url == '/curso-redes-complejas/' %} class="active"{% endif %}>2026-1</a>
        <a href="{{ '/curso-redes-complejas/calendario/' | relative_url }}"{% if page.url contains '/curso-redes-complejas/calendario/' %} class="active"{% endif %}>Calendario</a>
        <a href="{{ '/curso-redes-complejas/clases/' | relative_url }}"{% if page.url contains '/curso-redes-complejas/clases/' %} class="active"{% endif %}>Clases</a>
        <a href="{{ '/curso-redes-complejas/laboratorios/' | relative_url }}"{% if page.url contains '/curso-redes-complejas/laboratorios/' %} class="active"{% endif %}>Labs</a>
        <a href="{{ '/curso-redes-complejas/recursos-interactivos/' | relative_url }}"{% if page.url contains '/curso-redes-complejas/recursos-interactivos/' or page.url == '/bipartitas/' or page.url == '/comunidades/' or page.url == '/procesos/' %} class="active"{% endif %}>Recursos</a>
        <a href="{{ '/curso-redes-complejas/literatura/' | relative_url }}"{% if page.url contains 'literatura' %} class="active"{% endif %}>Literatura</a>
      </nav>
    </div>
  </header>

  <main class="main container">
    {{ content }}
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <span class="footer__left">
        © {{ site.time | date: "%Y" }} · Redes y Sistemas Complejos ·
        <a class="footer__link" href="https://www.criss-lab.com" target="_blank" rel="noopener">CRiSS-LAB</a>
      </span>
      <div class="footer__right">
        <span>By <a class="footer__link" href="https://www.crcandia.com" target="_blank" rel="noopener">Cristian Candia, Ph.D.</a></span>
        <a href="{{ '/curso-redes-complejas/calendario/' | relative_url }}">Calendario</a>
        <a href="{{ '/monografia/Monografia_Curso_Redes_2026.pdf' | relative_url }}" target="_blank">Monografía</a>
        <a href="https://github.com/crcandia/Curso_Redes_Sistemas_Complejos" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>

</body>
</html>
