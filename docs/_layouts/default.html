<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}" />
</head>
<body class="page">

  <header class="topbar">
    <div class="container topbar__inner">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-dot"></span>
        Redes y Sistemas Complejos
      </a>
      <nav class="nav" aria-label="Navegación principal">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Inicio</a>
        <a href="{{ '/2026-1-MDS/' | relative_url }}"{% if page.url == '/2026-1-MDS/' %} class="active"{% endif %}>2026-1</a>
        <a href="{{ '/2026-1-MDS/calendario/' | relative_url }}"{% if page.url contains 'calendario' %} class="active"{% endif %}>Calendario</a>
        <a href="{{ '/2026-1-MDS/slides/' | relative_url }}"{% if page.url contains 'slides' %} class="active"{% endif %}>Clases</a>
        <a href="{{ '/2026-1-MDS/labs/' | relative_url }}"{% if page.url contains 'labs' %} class="active"{% endif %}>Labs</a>
        <a href="{{ '/2026-1-MDS/recursos/' | relative_url }}"{% if page.url contains 'recursos' %} class="active"{% endif %}>Recursos</a>
        <a href="{{ '/2026-1-MDS/literatura/' | relative_url }}"{% if page.url contains 'literatura' %} class="active"{% endif %}>Literatura</a>
      </nav>
    </div>
  </header>

  <main class="main container">
    {{ content }}
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <span class="footer__left">© {{ site.time | date: "%Y" }} · Redes y Sistemas Complejos · Universidad del Desarrollo</span>
      <div class="footer__right">
        <a href="{{ '/2026-1-MDS/calendario/' | relative_url }}">Calendario</a>
        <a href="{{ '/monografia/Monografia_Curso_Redes_2026.pdf' | relative_url }}" target="_blank">Monografía</a>
        <a href="https://github.com/crcandia/Curso_Redes_Sistemas_Complejos" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>

</body>
</html>
